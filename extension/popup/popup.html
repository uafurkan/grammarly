<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { --green: #2f5d3a; }
    body {
      width: 268px; margin: 0; padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f4f2ec; color: #26241f;
    }
    h1 { font: 600 20px Georgia, serif; margin: 0 0 2px; }
    h1 em { color: var(--green); font-style: italic; }
    p { font-size: 12.5px; color: #6e6a5f; line-height: 1.5; margin: 0 0 14px; }
    label { font-size: 12px; color: #6e6a5f; display: block; margin-bottom: 6px; }
    select {
      width: 100%; padding: 8px; border-radius: 7px; border: 1px solid #e3dfd3;
      background: #fff; color: #26241f; font-size: 13px;
    }
    .note { margin-top: 14px; font-size: 11.5px; color: #9b968a; line-height: 1.5; }
    a { color: var(--green); }
  </style>
</head>
<body>
  <h1>Plu<em>ma</em></h1>
  <p>Free writing help in any text box. Your text stays on your device.</p>
  <label for="dialect">Language &amp; dialect</label>
  <select id="dialect"></select>
  <div class="note">
    Click into any text field on a page — a small Pluma badge appears with the
    number of suggestions. <a href="https://grammarly-six.vercel.app/" target="_blank">Open the full app →</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
